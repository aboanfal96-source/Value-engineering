<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة توليد تقارير الهندسة القيمية | EXPRO</title>
<meta name="description" content="منصة متخصصة لإعداد تقارير دراسة الهندسة القيمية وفق النموذج المعتمد من هيئة كفاءة الإنفاق والمشروعات الحكومية">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📐</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0B4F6C;
  --primary-light: #1A7FA8;
  --primary-dark: #073B51;
  --accent: #C8A415;
  --accent-light: #E0BE2A;
  --accent-dark: #9E8310;
  --bg: #F4F6F9;
  --card: #FFFFFF;
  --text: #1B1F2A;
  --text-secondary: #5A6478;
  --border: #DCE2EC;
  --success: #0D9668;
  --success-light: #D1FAE5;
  --warning: #D97706;
  --warning-light: #FEF3C7;
  --danger: #DC2626;
  --danger-light: #FEE2E2;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow: 0 4px 20px rgba(11,79,108,0.07);
  --shadow-lg: 0 12px 40px rgba(11,79,108,0.1);
  --radius: 10px;
  --radius-lg: 16px;
  --transition: 0.2s ease;
}

*{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth}

body{
  font-family:'Tajawal',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.7;
}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--primary-light);border-radius:3px}

/* ===== HEADER ===== */
.header{
  background:linear-gradient(135deg,var(--primary-dark),var(--primary) 60%,var(--primary-light));
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 16px rgba(0,0,0,0.18);
}
.header-top{
  max-width:1200px;margin:0 auto;
  padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:14px}
.brand-logo{
  width:44px;height:44px;
  background:var(--accent);border-radius:10px;
  display:grid;place-items:center;
  font-weight:900;font-size:14px;color:var(--primary-dark);
  font-family:'Cairo',sans-serif;
  box-shadow:0 3px 10px rgba(200,164,21,0.35);
  line-height:1.1;text-align:center;
}
.brand h1{color:#fff;font-size:19px;font-weight:800;font-family:'Cairo',sans-serif}
.brand-sub{color:rgba(255,255,255,0.6);font-size:11px;font-weight:400}
.header-tag{
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);
  color:#fff;padding:5px 14px;border-radius:16px;font-size:11px;font-weight:500;
}

/* Steps */
.steps-bar{
  background:rgba(0,0,0,0.12);
  padding:0 28px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.steps-bar::-webkit-scrollbar{height:0}
.steps-inner{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;gap:2px;
  min-width:max-content;
}
.step-pill{
  display:flex;align-items:center;gap:7px;
  padding:10px 14px;
  font-size:12.5px;font-weight:500;
  color:rgba(255,255,255,0.35);
  cursor:pointer;transition:var(--transition);
  white-space:nowrap;border-radius:6px;
  border:none;background:none;font-family:'Tajawal',sans-serif;
}
.step-pill:hover{color:rgba(255,255,255,0.6)}
.step-pill.active{color:#fff;background:rgba(255,255,255,0.12);font-weight:700}
.step-pill.done{color:var(--accent-light)}
.step-dot{
  width:22px;height:22px;border-radius:50%;
  display:grid;place-items:center;
  font-size:10px;font-weight:800;
  border:2px solid rgba(255,255,255,0.2);
  flex-shrink:0;
}
.step-pill.active .step-dot{background:var(--accent);color:var(--primary-dark);border-color:var(--accent)}
.step-pill.done .step-dot{background:var(--success);border-color:var(--success);color:#fff}
.step-line{width:18px;height:2px;background:rgba(255,255,255,0.12);flex-shrink:0}

/* ===== MAIN ===== */
.main{max-width:960px;margin:0 auto;padding:28px 20px 80px}

/* Cards */
.card{
  background:var(--card);border-radius:var(--radius-lg);
  box-shadow:var(--shadow);border:1px solid var(--border);
  padding:28px;margin-bottom:20px;
  animation:cardIn .35s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.card-title{
  font-family:'Cairo',sans-serif;font-size:18px;font-weight:800;
  color:var(--primary);margin-bottom:4px;
  display:flex;align-items:center;gap:10px;
}
.card-title i{
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  border-radius:9px;display:grid;place-items:center;
  color:#fff;font-size:16px;font-style:normal;
}
.card-desc{color:var(--text-secondary);font-size:13px;margin-bottom:22px;padding-right:44px}

/* Form */
.fg{margin-bottom:18px}
.fl{display:block;font-weight:700;font-size:13.5px;color:var(--text);margin-bottom:6px}
.fl .req{color:var(--danger);margin-right:2px}
.fl .hint{font-size:11.5px;color:var(--text-secondary);font-weight:400;margin-right:4px}

.fi,.fs,.ft{
  width:100%;padding:10px 14px;
  border:1.5px solid var(--border);border-radius:var(--radius);
  font-family:'Tajawal',sans-serif;font-size:14px;
  color:var(--text);background:var(--bg);
  transition:var(--transition);direction:rtl;
}
.fi:focus,.fs:focus,.ft:focus{
  outline:none;border-color:var(--primary-light);
  background:#fff;box-shadow:0 0 0 3px rgba(26,127,168,0.08);
}
.ft{min-height:90px;resize:vertical;line-height:1.9}

.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* Dynamic List */
.dl{display:flex;flex-direction:column;gap:10px}
.di{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;display:flex;gap:10px;align-items:flex-start;
  animation:cardIn .25s ease both;
}
.di-num{
  width:26px;height:26px;background:var(--primary);color:#fff;
  border-radius:7px;display:grid;place-items:center;
  font-size:11px;font-weight:800;flex-shrink:0;margin-top:2px;
}
.di-body{flex:1;display:flex;flex-direction:column;gap:7px}
.di-body input,.di-body textarea,.di-body select{
  width:100%;padding:7px 10px;
  border:1px solid var(--border);border-radius:7px;
  font-family:'Tajawal',sans-serif;font-size:13px;
  background:#fff;direction:rtl;
}
.di-body input:focus,.di-body textarea:focus,.di-body select:focus{
  outline:none;border-color:var(--primary-light);
}
.di-grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.di-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}

.btn-x{
  background:none;border:none;color:var(--danger);
  cursor:pointer;padding:2px;font-size:16px;opacity:.5;transition:var(--transition);
}
.btn-x:hover{opacity:1}

.btn-add{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 18px;background:transparent;
  border:1.5px dashed var(--primary-light);border-radius:var(--radius);
  color:var(--primary);font-family:'Tajawal',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);margin-top:6px;
}
.btn-add:hover{background:rgba(26,127,168,0.05);border-color:var(--primary)}

/* Buttons */
.acts{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:22px;padding-top:20px;border-top:1px solid var(--border);
}
.btn{
  padding:10px 28px;border-radius:var(--radius);
  font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:var(--transition);border:none;
  display:inline-flex;align-items:center;gap:7px;
}
.btn-p{
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;box-shadow:0 3px 12px rgba(11,79,108,0.25);
}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(11,79,108,0.35)}
.btn-s{background:var(--bg);color:var(--text);border:1.5px solid var(--border)}
.btn-s:hover{background:#fff;border-color:var(--primary-light)}
.btn-g{
  background:linear-gradient(135deg,var(--accent),var(--accent-light));
  color:var(--primary-dark);box-shadow:0 3px 12px rgba(200,164,21,0.25);
  font-size:15px;padding:12px 36px;
}
.btn-g:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(200,164,21,0.35)}
.btn-ok{background:var(--success);color:#fff}

/* Proposal Card */
.prop{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;margin-bottom:14px;
}
.prop-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--primary);
}
.prop-num{
  background:var(--primary);color:#fff;
  padding:3px 14px;border-radius:16px;font-weight:700;font-size:13px;
}

/* Info Box */
.info{
  background:rgba(26,127,168,0.05);border:1px solid rgba(26,127,168,0.12);
  border-radius:var(--radius);padding:12px 16px;margin-bottom:18px;
  font-size:12.5px;color:var(--primary);display:flex;gap:7px;align-items:flex-start;
}

/* Preview */
.prev-wrap{
  background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-lg);
  padding:44px 40px;max-width:880px;margin:0 auto;direction:rtl;
  font-family:'Tajawal',sans-serif;line-height:2;
}
.prev-wrap h1{
  font-family:'Cairo',sans-serif;color:var(--primary);font-size:24px;
  text-align:center;margin-bottom:20px;padding-bottom:14px;border-bottom:3px solid var(--accent);
}
.prev-wrap h2{
  font-family:'Cairo',sans-serif;color:var(--primary);font-size:18px;
  margin:22px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--border);
}
.prev-wrap h3{color:var(--primary-light);font-size:15px;margin:14px 0 6px}
.prev-wrap table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
.prev-wrap th{background:var(--primary);color:#fff;padding:8px 10px;font-weight:600}
.prev-wrap td{padding:7px 10px;border:1px solid var(--border)}
.prev-wrap tr:nth-child(even){background:var(--bg)}

/* Download */
.dl-acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:20px 0}

/* Welcome */
.welcome{text-align:center;padding:50px 20px}
.welcome-ico{
  width:90px;height:90px;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  border-radius:22px;display:grid;place-items:center;
  margin:0 auto 22px;font-size:42px;color:#fff;
  box-shadow:0 10px 30px rgba(11,79,108,0.2);
}
.welcome h2{font-family:'Cairo',sans-serif;font-size:26px;color:var(--primary);margin-bottom:10px}
.welcome>p{color:var(--text-secondary);font-size:15px;max-width:580px;margin:0 auto 28px;line-height:1.9}
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:660px;margin:0 auto 28px}
.feat{background:var(--bg);border-radius:var(--radius);padding:18px;text-align:center}
.feat .fi-c{font-size:26px;margin-bottom:6px}
.feat h4{color:var(--primary);font-size:13px;margin-bottom:3px}
.feat p{font-size:11.5px;color:var(--text-secondary);margin:0}

/* Notify */
.notify{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:var(--success);color:#fff;padding:10px 22px;border-radius:var(--radius);
  font-weight:600;font-size:13px;box-shadow:var(--shadow-lg);z-index:2000;
  animation:notIn .3s ease both;
}
@keyframes notIn{from{opacity:0;transform:translateX(-50%) translateY(-16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Loading */
.ld-over{
  position:fixed;inset:0;background:rgba(0,0,0,0.45);
  display:grid;place-items:center;z-index:1000;backdrop-filter:blur(3px);
}
.ld-box{background:#fff;border-radius:var(--radius-lg);padding:40px;text-align:center;box-shadow:var(--shadow-lg)}
.spinner{
  width:40px;height:40px;border:3.5px solid var(--border);
  border-top-color:var(--primary);border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.footer{
  text-align:center;padding:20px;color:var(--text-secondary);font-size:12.5px;
  border-top:1px solid var(--border);margin-top:36px;
}
.footer strong{color:var(--primary)}

/* Responsive */
@media(max-width:768px){
  .header-top{padding:10px 14px}
  .brand h1{font-size:15px}
  .header-tag{display:none}
  .steps-bar{padding:0 14px}
  .step-pill span:not(.step-dot){display:none}
  .step-pill{padding:8px 10px}
  .main{padding:14px 10px 60px}
  .card{padding:18px 14px}
  .fr2,.fr3{grid-template-columns:1fr}
  .di-grid2,.di-grid3{grid-template-columns:1fr}
  .prev-wrap{padding:20px 14px}
  .acts{flex-direction:column;gap:10px}
  .acts .btn{width:100%;justify-content:center}
  .feat-grid{grid-template-columns:1fr}
  .welcome{padding:30px 14px}
}
@media print{
  .header,.steps-bar,.acts,.dl-acts,.btn,.footer,.notify{display:none!important}
  .main{padding:0;max-width:100%}
  .card{box-shadow:none;border:none;padding:0;margin:0}
  .prev-wrap{border:none;padding:20px;box-shadow:none}
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ========== STATE ==========
const S = {
  step: 0,
  loading: false,
  notif: '',
  p: {
    projectName:'',projectNumber:'',govEntity:'',consultant:'',designConsultant:'',
    baseCost:'',baseCostVAT:'',studyDate:'',wsStart:'',wsEnd:'',wsDays:'3',
    designPhase:'',projectIntro:'',projectScope:'',
  },
  team: [{name:'',entity:'',role:'',spec:'',phone:'',email:''}],
  docs: [{name:''}],
  attrs: [{name:'',level:'8'}],
  funcs: [{el:'',fn:'',cls:''}],
  prioFn: [''],
  ideas: [{num:'',desc:'',eval:''}],
  props: [{
    num:'VE-01',title:'',curDesign:'',newDesign:'',pros:'',cons:'',
    costImp:'',impType:'تفادي تكلفة',adjFact:'1.0',adjReason:'',perfImp:'',risk:''
  }],
  costs: [{name:'',cost:''}],
};

const STEPS = [
  {l:'البداية',ic:'🏠'},{l:'بيانات المشروع',ic:'📋'},{l:'الفريق والوثائق',ic:'👥'},
  {l:'التحليل والنماذج',ic:'📊'},{l:'الأفكار والتقييم',ic:'💡'},
  {l:'المقترحات',ic:'📝'},{l:'المعاينة والتصدير',ic:'📄'},
];

// ========== HELPERS ==========
const esc = s => s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
const fNum = n => n ? Number(n).toLocaleString('ar-SA') : '-';
const fDate = d => d ? new Date(d).toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'}) : '___/___/______';

function formatInput(el){
  let v = el.value.replace(/[^\d.]/g,'');
  if(v){const p=v.split('.');p[0]=parseInt(p[0]).toLocaleString('en');el.value=p.join('.')}
}

function notify(m){S.notif=m;R();setTimeout(()=>{S.notif='';R()},3500)}

function saveFields(){
  const ids=['projectName','projectNumber','govEntity','consultant','designConsultant','baseCost','baseCostVAT','studyDate','wsStart','wsEnd','wsDays','designPhase','projectIntro','projectScope'];
  ids.forEach(f=>{const e=document.getElementById(f);if(e)S.p[f]=e.value});
}

function go(s){saveFields();S.step=s;R();window.scrollTo(0,0)}

function next(s){
  saveFields();S.step=s;
  if(s===6){S.loading=true;R();setTimeout(()=>{S.loading=false;R();window.scrollTo(0,0)},1200)}
  else{R();window.scrollTo(0,0)}
}

// ========== CRUD ==========
function addTo(arr,obj){arr.push(obj);R()}
function rmFrom(arr,i){arr.splice(i,1);R()}
function updArr(arr,i,k,v){arr[i][k]=v}

// ========== RENDER ==========
function R(){
  document.getElementById('app').innerHTML = `
    ${hdr()}
    <div class="main">
      ${S.loading?ld():''}
      ${S.notif?`<div class="notify">${S.notif}</div>`:''}
      ${renderStep()}
    </div>
    <div class="footer">بواسطة المهندس <strong>جاسر العتيبي</strong> | متوافق مع معايير هيئة كفاءة الإنفاق والمشروعات الحكومية (EXPRO)</div>
  `;
  attachEvts();
}

function hdr(){
  return `<div class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-logo">هـ ق</div>
        <div><h1>منصة توليد تقارير الهندسة القيمية</h1><div class="brand-sub">وفق نموذج هيئة كفاءة الإنفاق والمشروعات الحكومية (EXPRO)</div></div>
      </div>
      <div class="header-tag">EPM-KEV-TP-000002</div>
    </div>
    <div class="steps-bar"><div class="steps-inner">
      ${STEPS.map((s,i)=>`
        ${i?'<div class="step-line"></div>':''}
        <button class="step-pill ${i===S.step?'active':''} ${i<S.step?'done':''}" onclick="go(${i})">
          <span class="step-dot">${i<S.step?'✓':i+1}</span><span>${s.l}</span>
        </button>
      `).join('')}
    </div></div>
  </div>`;
}

function ld(){
  return `<div class="ld-over"><div class="ld-box"><div class="spinner"></div>
    <div style="font-weight:700;font-size:15px;color:var(--primary);margin-bottom:3px">جارِ إعداد التقرير...</div>
    <div style="color:var(--text-secondary);font-size:12px">يتم توليد تقرير الهندسة القيمية وفق معايير EXPRO</div>
  </div></div>`;
}

function renderStep(){
  switch(S.step){
    case 0:return sWelcome();
    case 1:return sProject();
    case 2:return sTeam();
    case 3:return sAnalysis();
    case 4:return sIdeas();
    case 5:return sProps();
    case 6:return sPreview();
  }
}

function acts(prev,nxt){
  return `<div class="acts">
    <button class="btn btn-s" onclick="go(${prev})">→ السابق</button>
    <button class="btn btn-p" onclick="next(${nxt})">${nxt===6?'معاينة التقرير ←':'التالي ←'}</button>
  </div>`;
}

// ========== STEP 0 ==========
function sWelcome(){
  return `<div class="card"><div class="welcome">
    <div class="welcome-ico">📐</div>
    <h2>منصة توليد تقارير الهندسة القيمية</h2>
    <p>منصة متخصصة لإعداد تقارير دراسة الهندسة القيمية وفق النموذج المعتمد من هيئة كفاءة الإنفاق والمشروعات الحكومية (EXPRO)، بمستوى احترافي متقدم.</p>
    <div class="feat-grid">
      <div class="feat"><div class="fi-c">📋</div><h4>نموذج EXPRO</h4><p>متوافق 100% مع النموذج الإرشادي</p></div>
      <div class="feat"><div class="fi-c">⚡</div><h4>توليد تلقائي</h4><p>صياغة مهنية رصينة لجميع الأقسام</p></div>
      <div class="feat"><div class="fi-c">📊</div><h4>جداول التقييم</h4><p>نماذج A, B, C, D جاهزة وتفاعلية</p></div>
    </div>
    <button class="btn btn-g" onclick="go(1)">ابدأ إعداد التقرير ←</button>
  </div></div>`;
}

// ========== STEP 1 ==========
function sProject(){
  const d=S.p;
  return `<div class="card">
    <div class="card-title"><i>📋</i> بيانات المشروع الأساسية</div>
    <div class="card-desc">أدخل المعلومات الأساسية للمشروع كما ستظهر في صفحة الغلاف وجميع أقسام التقرير</div>

    <div class="fg"><label class="fl"><span class="req">*</span> اسم المشروع</label>
      <input class="fi" id="projectName" value="${esc(d.projectName)}" placeholder="مثال: مشروع إنشاء وتنفيذ مخرجات الدراسة الهيدرولوجية..."></div>

    <div class="fr2">

function genReport(){

  S.props.forEach(p=>{

    const f=parseFloat(p.adjFact||'1');
    if(p.impType==='تفادي تكلفة')totAvoid+=imp*f;else totAdd+=imp*f;
  });
  const avPct=bc>0?((totAvoid/bc)*100).toFixed(2):'0';
  const devIdeas=S.ideas.filter(i=>['A','B','C'].includes(i.eval));

    <h3>1-5 فريق الهندسة القيمية</h3>

    ${S.team.map((m,i)=>`<tr><td>${i+1}</td><td>${esc(m.name)}</td><td>${esc(m.entity)}</td><td>${esc(m.role)}</td><td>${esc(m.spec)}</td></tr>`).join('')}</table>

    <h2>2. نظرة عامة عن المشروع</h2>
    <h3>2-1 مقدمة</h3><p>${esc(d.projectIntro)||'يهدف المشروع إلى تحقيق متطلبات الجهة الحكومية وفق أعلى معايير الجودة والكفاءة.'}</p>
    <h3>2-2 النطاق والموقع</h3><p>${esc(d.projectScope)||'يقع المشروع ضمن النطاق المحدد ويشمل كافة الأعمال المطلوبة.'}</p>
    <h3>2-3 الوثائق المرجعية</h3>
    <table><tr><th>#</th><th>المستند</th></tr>${S.docs.map((doc,i)=>`<tr><td>${i+1}</td><td>${esc(doc.name)||'-'}</td></tr>`).join('')}</table>

    <h2>3. خطة عمل الهندسة القيمية</h2>
    <p>تُعتبر مراحل خطة العمل العمود الفقري لتطبيق منهجية الهندسة القيمية، حيث تمثل تسلسلًا منطقيًا يضمن تحقيق أقصى استفادة من العملية.</p>

    <h2>4. تحليل المعلومات والنماذج</h2>
    <h3>4-1 تحليل التكاليف</h3>
    ${S.costs.filter(c=>c.name).length?`<table><tr><th>البند</th><th>التكلفة</th><th>النسبة</th></tr>
    ${S.costs.filter(c=>c.name).map(c=>{
      const cv=parseFloat((c.cost||'0').replace(/,/g,''));
      return `<tr><td>${esc(c.name)}</td><td>${fNum(cv)}</td><td>${bc>0?((cv/bc)*100).toFixed(1):'0'}%</td></tr>`;
    }).join('')}</table>`:'<p>لم يتم إدخال بنود.</p>'}

    <h3>4-2 سمات الأداء</h3>
    <table><tr><th>السمة</th><th>المستوى</th></tr>
    ${S.attrs.filter(a=>a.name).map(a=>`<tr><td>${esc(a.name)}</td><td>${a.level}</td></tr>`).join('')}</table>

    <h2>5. تحليل الوظائف</h2>
    ${S.funcs.filter(f=>f.el).length?`<table><tr><th>م</th><th>العنصر</th><th>الوظيفة</th><th>التصنيف</th></tr>
    ${S.funcs.filter(f=>f.el).map((f,i)=>`<tr><td>${i+1}</td><td>${esc(f.el)}</td><td>${esc(f.fn)}</td><td>${esc(f.cls)}</td></tr>`).join('')}</table>`:''}
    ${S.prioFn.filter(p=>p).length?`<h3>الوظائف ذات الأولوية</h3><ul style="padding-right:22px">${S.prioFn.filter(p=>p).map(p=>`<li>${esc(p)}</li>`).join('')}</ul>`:''}

    <h2>6. طرح الأفكار</h2>
    <table><tr><th>م</th><th>الرقم</th><th>الوصف</th></tr>
    ${S.ideas.map((idea,i)=>`<tr><td>${i+1}</td><td>${esc(idea.num)}</td><td>${esc(idea.desc)}</td></tr>`).join('')}</table>

    <h2>7. التقييم</h2>
    <p>تم استخدام أسلوب التقييم بالرموز الحرفية: A (ممتاز)، B (جيد)، C (مقبول/اعتبار تصميمي)، D (مستبعد).</p>
    <table><tr><th>م</th><th>الرقم</th><th>الوصف</th><th>التقييم</th></tr>
    ${S.ideas.map((idea,i)=>`<tr><td>${i+1}</td><td>${esc(idea.num)}</td><td>${esc(idea.desc)}</td>
    <td style="font-weight:700;color:${idea.eval==='D'?'#DC2626':'#0D9668'}">${idea.eval||'-'}</td></tr>`).join('')}</table>

    <h2>8. التطوير</h2>
    <p>نتج <strong>${S.ideas.length}</strong> فكرة، واختيرت <strong>${devIdeas.length}</strong> للتطوير.</p>

    ${S.props.map(p=>{
      const imp=parseFloat((p.costImp||'0').replace(/,/g,''));
      const f=parseFloat(p.adjFact||'1');
      return `<div style="border:2px solid #0B4F6C;border-radius:10px;padding:18px;margin:14px 0">
        <div style="background:#0B4F6C;color:#fff;display:inline-block;padding:3px 14px;border-radius:7px;font-weight:700;margin-bottom:10px;font-size:14px">المقترح ${esc(p.num)}: ${esc(p.title)}</div>
        <h3>التصميم الأساسي</h3><p>${esc(p.curDesign)||'-'}</p>
        <h3>المقترح البديل</h3><p>${esc(p.newDesign)||'-'}</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:10px 0">
          <div style="background:#D1FAE5;padding:10px;border-radius:7px"><strong style="color:#0D9668">المزايا:</strong><p style="margin-top:3px">${esc(p.pros)||'-'}</p></div>
          <div style="background:#FEF3C7;padding:10px;border-radius:7px"><strong style="color:#D97706">السلبيات:</strong><p style="margin-top:3px">${esc(p.cons)||'لا توجد سلبيات جوهرية'}</p></div>
        </div>
        <table><tr><th>التصنيف</th><th>الأثر المالي</th><th>المعامل</th><th>المعدّل</th></tr>
        <tr><td>${esc(p.impType)}</td><td>${fNum(imp)} ريال</td><td>${f}</td><td style="font-weight:700">${fNum((imp*f).toFixed(0))} ريال</td></tr></table>
        ${p.perfImp?`<h3>أثر الأداء</h3><p>${esc(p.perfImp)}</p>`:''}
        ${p.risk?`<h3>المخاطر</h3><p>${esc(p.risk)}</p>`:''}
      </div>`;
    }).join('')}

    <div style="text-align:center;margin-top:36px;padding:16px;background:#f0f4f8;border-radius:10px;color:#5A6478;font-size:12px">
      <div>رقم الوثيقة: EPM-KEV-TP-000002 | الإصدار: 000</div>
      <div style="margin-top:3px">هذا المستند ملكية خاصة لهيئة كفاءة الإنفاق والمشروعات الحكومية</div>
    </div>
  `;
}

function dlWord(){
  notify('جارِ إعداد ملف Word...');
  const c=document.getElementById('rpt').innerHTML;
  const html=`<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
  <head><meta charset='utf-8'><style>
    @page{size:A4;margin:2cm}
    body{font-family:'Tajawal','Arial',sans-serif;direction:rtl;font-size:14px;line-height:2;color:#1B1F2A}
    h1{color:#0B4F6C;font-size:22px;text-align:center;border-bottom:3px solid #C8A415;padding-bottom:10px}
    h2{color:#0B4F6C;font-size:17px;border-bottom:2px solid #DCE2EC;padding-bottom:5px;margin-top:22px}
    h3{color:#1A7FA8;font-size:14px;margin-top:14px}
    table{width:100%;border-collapse:collapse;margin:10px 0}
    th{background:#0B4F6C;color:#fff;padding:7px;font-weight:600}
    td{padding:5px 7px;border:1px solid #DCE2EC}
    tr:nth-child(even){background:#F4F6F9}
    strong{color:#0B4F6C}
  </style></head><body>${c}</body></html>`;
  const blob=new Blob(['\ufeff',html],{type:'application/msword'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download='تقرير_دراسة_الهندسة_القيمية.doc';a.click();
  URL.revokeObjectURL(url);
}

// ========== EVENTS ==========
function attachEvts(){
  const el=document.getElementById('baseCost');
  if(el){
    el.addEventListener('input',()=>{
      const n=parseFloat(el.value.replace(/[^\d.]/g,''));
      if(!isNaN(n)){
        const vatEl=document.getElementById('baseCostVAT');
        if(vatEl)vatEl.value=(n*1.15).toLocaleString('en');
        S.p.baseCostVAT=(n*1.15).toLocaleString('en');
      }
    });
  }
}
