<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة توليد تقارير الهندسة القيمية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0B4F6C;
  --primary-light: #1A7FA8;
  --primary-dark: #073B51;
  --accent: #D4AF37;
  --accent-light: #E8C94A;
  --bg: #F7F8FA;
  --card: #FFFFFF;
  --text: #1A1A2E;
  --text-secondary: #5A6478;
  --border: #E2E8F0;
  --success: #10B981;
  --warning: #F59E0B;
  --danger: #EF4444;
  --shadow: 0 4px 24px rgba(11,79,108,0.08);
  --shadow-lg: 0 12px 48px rgba(11,79,108,0.12);
  --radius: 12px;
  --radius-lg: 20px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 3px; }

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-icon {
  width: 48px;
  height: 48px;
  background: var(--accent);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: var(--primary-dark);
  font-weight: 900;
  box-shadow: 0 4px 12px rgba(212,175,55,0.3);
}

.header h1 {
  color: white;
  font-size: 22px;
  font-weight: 800;
  font-family: 'Cairo', sans-serif;
  letter-spacing: -0.5px;
}

.header-sub {
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  font-weight: 400;
}

.header-badge {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
}

/* Progress Steps */
.progress-bar {
  background: rgba(255,255,255,0.06);
  padding: 12px 32px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.progress-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 4px;
}

.step-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  transition: all 0.3s;
  cursor: pointer;
  white-space: nowrap;
}

.step-item.active {
  background: rgba(255,255,255,0.15);
  color: white;
  font-weight: 600;
}

.step-item.completed {
  color: var(--accent-light);
}

.step-num {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  border: 2px solid rgba(255,255,255,0.2);
  flex-shrink: 0;
}

.step-item.active .step-num {
  background: var(--accent);
  color: var(--primary-dark);
  border-color: var(--accent);
}

.step-item.completed .step-num {
  background: var(--success);
  border-color: var(--success);
  color: white;
}

.step-connector {
  width: 24px;
  height: 2px;
  background: rgba(255,255,255,0.15);
  flex-shrink: 0;
}

/* Main Content */
.main {
  max-width: 1000px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* Section Card */
.section-card {
  background: var(--card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  padding: 32px;
  margin-bottom: 24px;
  border: 1px solid var(--border);
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity:0; transform: translateY(12px); }
  to { opacity:1; transform: translateY(0); }
}

.section-title {
  font-family: 'Cairo', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title .icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
}

.section-desc {
  color: var(--text-secondary);
  font-size: 14px;
  margin-bottom: 24px;
  padding-right: 46px;
}

/* Form Elements */
.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-weight: 700;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 8px;
}

.form-label .required {
  color: var(--danger);
  margin-right: 2px;
}

.form-hint {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 400;
  margin-right: 4px;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-family: 'Tajawal', sans-serif;
  font-size: 15px;
  color: var(--text);
  background: var(--bg);
  transition: all 0.2s;
  direction: rtl;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--primary-light);
  background: white;
  box-shadow: 0 0 0 4px rgba(26,127,168,0.1);
}

.form-textarea {
  min-height: 100px;
  resize: vertical;
  line-height: 1.8;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.form-row-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}

/* Dynamic Items */
.dynamic-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.dynamic-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  animation: fadeIn 0.3s ease;
}

.dynamic-item .item-num {
  width: 28px;
  height: 28px;
  background: var(--primary);
  color: white;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 2px;
}

.dynamic-item .item-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.dynamic-item .item-content input,
.dynamic-item .item-content textarea,
.dynamic-item .item-content select {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'Tajawal', sans-serif;
  font-size: 14px;
  background: white;
  direction: rtl;
}

.dynamic-item .item-content input:focus,
.dynamic-item .item-content textarea:focus {
  outline: none;
  border-color: var(--primary-light);
}

.btn-remove {
  background: none;
  border: none;
  color: var(--danger);
  cursor: pointer;
  padding: 4px;
  font-size: 18px;
  opacity: 0.6;
  transition: opacity 0.2s;
}

.btn-remove:hover { opacity: 1; }

.btn-add {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  background: transparent;
  border: 2px dashed var(--primary-light);
  border-radius: var(--radius);
  color: var(--primary);
  font-family: 'Tajawal', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}

.btn-add:hover {
  background: rgba(26,127,168,0.06);
  border-color: var(--primary);
}

/* Buttons */
.actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.btn {
  padding: 12px 32px;
  border-radius: var(--radius);
  font-family: 'Tajawal', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  box-shadow: 0 4px 16px rgba(11,79,108,0.3);
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(11,79,108,0.4);
}

.btn-secondary {
  background: var(--bg);
  color: var(--text);
  border: 2px solid var(--border);
}

.btn-secondary:hover {
  background: white;
  border-color: var(--primary-light);
}

.btn-gold {
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  color: var(--primary-dark);
  box-shadow: 0 4px 16px rgba(212,175,55,0.3);
  font-size: 16px;
  padding: 14px 40px;
}

.btn-gold:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(212,175,55,0.4);
}

.btn-success {
  background: var(--success);
  color: white;
}

/* Table Styles */
.eval-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 14px;
}

.eval-table th {
  background: var(--primary);
  color: white;
  padding: 10px 12px;
  font-weight: 600;
  text-align: center;
}

.eval-table th:first-child { border-radius: 0 8px 0 0; }
.eval-table th:last-child { border-radius: 8px 0 0 0; }

.eval-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}

.eval-table tr:nth-child(even) { background: var(--bg); }

.eval-table select, .eval-table input {
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: 'Tajawal', sans-serif;
  font-size: 13px;
  text-align: center;
  width: 100%;
  direction: rtl;
}

/* Proposal Card */
.proposal-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}

.proposal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--primary);
}

.proposal-num {
  background: var(--primary);
  color: white;
  padding: 4px 16px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 14px;
}

/* Preview Area */
.preview-container {
  background: white;
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 48px;
  max-width: 900px;
  margin: 0 auto;
  direction: rtl;
  font-family: 'Tajawal', sans-serif;
  line-height: 2;
  min-height: 600px;
}

.preview-container h1 {
  font-family: 'Cairo', sans-serif;
  color: var(--primary);
  font-size: 28px;
  text-align: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 3px solid var(--accent);
}

.preview-container h2 {
  font-family: 'Cairo', sans-serif;
  color: var(--primary);
  font-size: 20px;
  margin: 24px 0 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
}

.preview-container h3 {
  color: var(--primary-light);
  font-size: 17px;
  margin: 16px 0 8px;
}

.preview-container table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 14px;
}

.preview-container table th {
  background: var(--primary);
  color: white;
  padding: 10px;
  font-weight: 600;
}

.preview-container table td {
  padding: 8px 10px;
  border: 1px solid var(--border);
}

.preview-container table tr:nth-child(even) { background: var(--bg); }

/* Loading */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(4px);
}

.loading-card {
  background: white;
  border-radius: var(--radius-lg);
  padding: 48px;
  text-align: center;
  box-shadow: var(--shadow-lg);
}

.spinner {
  width: 48px;
  height: 48px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Footer */
.footer {
  text-align: center;
  padding: 24px;
  color: var(--text-secondary);
  font-size: 13px;
  border-top: 1px solid var(--border);
  margin-top: 40px;
}

.footer strong {
  color: var(--primary);
}

/* Download Buttons */
.download-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 24px 0;
}

/* Responsive */
@media (max-width: 768px) {
  .header-inner { padding: 12px 16px; }
  .header h1 { font-size: 16px; }
  .header-badge { display: none; }
  .progress-bar { overflow-x: auto; padding: 10px 16px; }
  .step-item span:not(.step-num) { display: none; }
  .main { padding: 16px 12px 60px; }
  .section-card { padding: 20px 16px; }
  .form-row, .form-row-3 { grid-template-columns: 1fr; }
  .preview-container { padding: 24px 16px; }
  .actions { flex-direction: column; gap: 12px; }
  .btn { width: 100%; justify-content: center; }
}

/* Notification */
.notification {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--success);
  color: white;
  padding: 12px 24px;
  border-radius: var(--radius);
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  z-index: 2000;
  animation: slideDown 0.3s ease;
}

@keyframes slideDown {
  from { opacity:0; transform: translateX(-50%) translateY(-20px); }
  to { opacity:1; transform: translateX(-50%) translateY(0); }
}

/* Welcome Screen */
.welcome-screen {
  text-align: center;
  padding: 60px 24px;
}

.welcome-icon {
  width: 100px;
  height: 100px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  font-size: 48px;
  color: white;
  box-shadow: 0 12px 36px rgba(11,79,108,0.25);
}

.welcome-screen h2 {
  font-family: 'Cairo', sans-serif;
  font-size: 28px;
  color: var(--primary);
  margin-bottom: 12px;
}

.welcome-screen p {
  color: var(--text-secondary);
  font-size: 16px;
  max-width: 600px;
  margin: 0 auto 32px;
  line-height: 1.8;
}

.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  max-width: 700px;
  margin: 0 auto 32px;
}

.feature-item {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
}

.feature-item .f-icon {
  font-size: 28px;
  margin-bottom: 8px;
}

.feature-item h4 {
  color: var(--primary);
  font-size: 14px;
  margin-bottom: 4px;
}

.feature-item p {
  font-size: 12px;
  color: var(--text-secondary);
  margin: 0;
}

.info-box {
  background: rgba(26,127,168,0.06);
  border: 1px solid rgba(26,127,168,0.15);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 20px;
  font-size: 13px;
  color: var(--primary);
  display: flex;
  gap: 8px;
  align-items: flex-start;
}

.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  background: var(--bg);
  padding: 4px;
  border-radius: 10px;
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-secondary);
  border: none;
  background: none;
  font-family: 'Tajawal', sans-serif;
}

.tab.active {
  background: white;
  color: var(--primary);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ==================== STATE ====================
const state = {
  currentStep: 0,
  loading: false,
  notification: '',
  previewMode: 'preview',
  projectData: {
    projectName: '',
    projectNumber: '',
    governmentEntity: '',
    consultant: '',
    designConsultant: '',
    baseCost: '',
    baseCostWithVAT: '',
    studyDate: '',
    workshopStartDate: '',
    workshopEndDate: '',
    workshopDays: '3',
    designPhase: '',
    projectScope: '',
    projectIntro: '',
    siteDescription: '',
  },
  teamMembers: [{ name:'', entity:'', role:'', specialty:'', phone:'', email:'' }],
  documents: [{ name:'' }],
  performanceAttributes: [{ name:'', level: '8' }],
  functions: [{ element:'', func:'', classification:'' }],
  priorityFunctions: [''],
  ideas: [{ number:'', description:'', evaluation:'' }],
  proposals: [{
    number: 'VE-01',
    title: '',
    currentDesign: '',
    proposedDesign: '',
    advantages: '',
    disadvantages: '',
    costImpact: '',
    impactType: 'تفادي تكلفة',
    adjustmentFactor: '1.0',
    adjustmentReason: '',
    performanceImpact: '',
    riskAnalysis: '',
  }],
  costItems: [{ name:'', cost:'' }],
};

const steps = [
  { label: 'البداية', icon: '🏠' },
  { label: 'بيانات المشروع', icon: '📋' },
  { label: 'الفريق والوثائق', icon: '👥' },
  { label: 'التحليل والنماذج', icon: '📊' },
  { label: 'الأفكار والتقييم', icon: '💡' },
  { label: 'المقترحات', icon: '📝' },
  { label: 'المعاينة والتصدير', icon: '📄' },
];

// ==================== RENDER ====================
function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    ${renderHeader()}
    <div class="main">
      ${state.loading ? renderLoading() : ''}
      ${state.notification ? `<div class="notification">${state.notification}</div>` : ''}
      ${renderStep()}
    </div>
    <div class="footer">
      بواسطة المهندس <strong>جاسر العتيبي</strong> | متوافق مع معايير هيئة كفاءة الإنفاق والمشروعات الحكومية (EXPRO)
    </div>
  `;
  attachEvents();
}

function renderHeader() {
  return `
    <div class="header">
      <div class="header-inner">
        <div class="header-brand">
          <div class="header-icon">هـ ق</div>
          <div>
            <h1>منصة توليد تقارير الهندسة القيمية</h1>
            <div class="header-sub">متوافق مع نموذج هيئة كفاءة الإنفاق والمشروعات الحكومية (EXPRO)</div>
          </div>
        </div>
        <div class="header-badge">EPM-KEV-TP-000002</div>
      </div>
      <div class="progress-bar">
        <div class="progress-inner">
          ${steps.map((s, i) => `
            ${i > 0 ? '<div class="step-connector"></div>' : ''}
            <div class="step-item ${i === state.currentStep ? 'active' : ''} ${i < state.currentStep ? 'completed' : ''}" onclick="goToStep(${i})">
              <span class="step-num">${i < state.currentStep ? '✓' : i + 1}</span>
              <span>${s.label}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderLoading() {
  return `
    <div class="loading-overlay">
      <div class="loading-card">
        <div class="spinner"></div>
        <div style="font-weight:700;font-size:16px;color:var(--primary);margin-bottom:4px">جارِ إعداد التقرير...</div>
        <div style="color:var(--text-secondary);font-size:13px">يتم توليد تقرير الهندسة القيمية وفق معايير EXPRO</div>
      </div>
    </div>
  `;
}

function renderStep() {
  switch(state.currentStep) {
    case 0: return renderWelcome();
    case 1: return renderProjectData();
    case 2: return renderTeamDocs();
    case 3: return renderAnalysis();
    case 4: return renderIdeasEval();
    case 5: return renderProposals();
    case 6: return renderPreview();
    default: return '';
  }
}

// ==================== STEP 0: WELCOME ====================
function renderWelcome() {
  return `
    <div class="section-card">
      <div class="welcome-screen">

// ==================== REPORT GENERATION ====================
function generateReportHTML() {
  const d = state.projectData;
  const baseCostNum = parseFloat((d.baseCost||'0').replace(/,/g,''));
  const vatCost = baseCostNum * 1.15;

  // Calculate financial summary
  let totalAvoidance = 0;
  let totalAdditional = 0;
  state.proposals.forEach(p => {
    const impact = parseFloat((p.costImpact||'0').replace(/,/g,''));
    const factor = parseFloat(p.adjustmentFactor || '1.0');
    const adjusted = impact * factor;
    if (p.impactType === 'تفادي تكلفة') totalAvoidance += adjusted;
    else totalAdditional += adjusted;
  });
  const avoidancePercent = baseCostNum > 0 ? ((totalAvoidance / baseCostNum) * 100).toFixed(2) : '0';

  const developedIdeas = state.ideas.filter(i => ['A','B','C'].includes(i.evaluation));
  const excludedIdeas = state.ideas.filter(i => i.evaluation === 'D');
  const designConsiderations = state.ideas.filter(i => i.evaluation === 'C');

// ==================== ACTIONS ====================
function renderActions(step, prevStep, nextStep) {
  return `
    <div class="actions">
      <button class="btn btn-secondary" onclick="goToStep(${prevStep})">→ السابق</button>
      <button class="btn btn-primary" onclick="saveAndNext(${nextStep})">${nextStep === 6 ? 'معاينة التقرير' : 'التالي'} ←</button>
    </div>
  `;
}

// ==================== EVENT HANDLERS ====================
function attachEvents() {
  // Project data inputs
  const fields = ['projectName','projectNumber','governmentEntity','consultant','designConsultant','baseCost','baseCostWithVAT','studyDate','workshopStartDate','workshopEndDate','workshopDays','designPhase','projectIntro','projectScope','siteDescription'];
  fields.forEach(f => {
    const el = document.getElementById(f);
    if (el) {
      el.addEventListener('change', () => {
        state.projectData[f] = el.value;
        if (f === 'baseCost') {
          const num = parseFloat(el.value.replace(/,/g,''));
          if (!isNaN(num)) {
            state.projectData.baseCostWithVAT = (num * 1.15).toLocaleString();
            const vatEl = document.getElementById('baseCostWithVAT');
            if (vatEl) vatEl.value = state.projectData.baseCostWithVAT;
          }
        }
      });
    }
  });
}

function formatNumber(el) {
  let val = el.value.replace(/[^\d.]/g,'');
  if (val) {
    const parts = val.split('.');
    parts[0] = parseInt(parts[0]).toLocaleString();
    el.value = parts.join('.');
  }
}

function goToStep(step) {
  saveCurrentStep();
  state.currentStep = step;
  render();
  window.scrollTo(0, 0);
}

function saveAndNext(nextStep) {
  saveCurrentStep();
  state.currentStep = nextStep;
  if (nextStep === 6) {
    state.loading = true;
    render();
    setTimeout(() => {
      state.loading = false;
      render();
      window.scrollTo(0, 0);
    }, 1500);
  } else {
    render();
    window.scrollTo(0, 0);
  }
}

function saveCurrentStep() {
  const fields = ['projectName','projectNumber','governmentEntity','consultant','designConsultant','baseCost','baseCostWithVAT','studyDate','workshopStartDate','workshopEndDate','workshopDays','designPhase','projectIntro','projectScope'];
  fields.forEach(f => {
    const el = document.getElementById(f);
    if (el) state.projectData[f] = el.value;
  });
}

// Download functions
function downloadWord() {
  showNotification('جارِ إعداد ملف Word... سيبدأ التحميل بعد إعداد الملف عبر المنصة');
  const content = document.getElementById('reportPreview').innerHTML;
  const html = `
    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
    <head><meta charset='utf-8'>
    <style>
      @page { size: A4; margin: 2cm; }
      body { font-family: 'Tajawal', 'Arial', sans-serif; direction: rtl; font-size: 14px; line-height: 2; color: #1a1a2e; }
      h1 { color: #0B4F6C; font-size: 24px; text-align: center; border-bottom: 3px solid #D4AF37; padding-bottom: 12px; }
      h2 { color: #0B4F6C; font-size: 18px; border-bottom: 2px solid #e2e8f0; padding-bottom: 6px; margin-top: 24px; }
      h3 { color: #1A7FA8; font-size: 15px; margin-top: 16px; }
      table { width: 100%; border-collapse: collapse; margin: 12px 0; }
      th { background: #0B4F6C; color: white; padding: 8px; font-weight: 600; }
      td { padding: 6px 8px; border: 1px solid #e2e8f0; }
      tr:nth-child(even) { background: #f7f8fa; }
      p { margin: 8px 0; }
      strong { color: #0B4F6C; }
    </style></head><body>${content}</body></html>
  `;
  const blob = new Blob(['\ufeff', html], {type:'application/msword'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'تقرير_دراسة_الهندسة_القيمية.doc';
  a.click();
  URL.revokeObjectURL(url);
}

function downloadPDF() {
  showNotification('جارِ إعداد ملف PDF... يرجى استخدام طباعة المتصفح (Ctrl+P) واختيار PDF');
  const content = document.getElementById('reportPreview').innerHTML;
  const win = window.open('', '_blank');
  win.document.write(`
    <html dir="rtl"><head><meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      @page { size: A4; margin: 2cm; }
      body { font-family: 'Tajawal', sans-serif; direction: rtl; font-size: 13px; line-height: 1.8; color: #1a1a2e; padding: 20px; }
      h1 { color: #0B4F6C; font-size: 22px; text-align: center; border-bottom: 3px solid #D4AF37; padding-bottom: 12px; }
      h2 { color: #0B4F6C; font-size: 17px; border-bottom: 2px solid #e2e8f0; padding-bottom: 6px; margin-top: 20px; page-break-after: avoid; }
      h3 { color: #1A7FA8; font-size: 14px; margin-top: 14px; page-break-after: avoid; }
      table { width: 100%; border-collapse: collapse; margin: 10px 0; page-break-inside: avoid; }
      th { background: #0B4F6C; color: white; padding: 6px 8px; font-size: 12px; }
      td { padding: 5px 8px; border: 1px solid #ddd; font-size: 12px; }
      tr:nth-child(even) { background: #f5f5f5; }
    </style>
    </head><body>${content}
    <script>setTimeout(()=>window.print(),500)<\/script>
    </body></html>
  `);
  win.document.close();
}

function showNotification(msg) {
  state.notification = msg;
  render();
  setTimeout(() => { state.notification = ''; render(); }, 4000);
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Initial render
render();
